<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Выход из системы</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
        .logout-card {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #dc3545;
            color: white;
            border: none;
            cursor: pointer;
        }
        a {
            display: block;
            margin-top: 10px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="logout-card">
    <h3>Выход из системы</h3>

    <p>Вы уверены, что хотите выйти?</p>

    <form th:action="@{/logout}" method="post">
        <button type="submit">Выйти</button>
    </form>

    <a th:href="@{/}">Отмена</a>
</div>

</body>
</html>

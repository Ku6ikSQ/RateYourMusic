<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .login-card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        .error { color: red; margin-bottom: 10px; }
        .logout { color: green; margin-bottom: 10px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="login-card">
    <h3>Авторизация</h3>

    <div th:if="${param.error}" class="error">
        Неверное имя пользователя или пароль.
    </div>

    <div th:if="${param.logout}" class="logout">
        Вы успешно вышли из системы.
    </div>

    <form th:action="@{/login}" method="post">
        <div>
            <label>Логин:</label>
            <input type="text" name="username" required autofocus/>
        </div>
        <div>
            <label>Пароль:</label>
            <input type="password" name="password" required/>
        </div>
        <button type="submit">Войти</button>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .reg-card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        .error { color: red; margin-bottom: 10px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="reg-card">
    <h3>Регистрация нового пользователя</h3>

    <div th:if="${message}" class="error" th:text="${message}"></div>

    <form th:action="@{/registration}" method="post">
        <div>
            <label>Имя пользователя:</label>
            <input type="text" name="username" required/>
        </div>
        <div>
            <label>Пароль:</label>
            <input type="password" name="password" required/>
        </div>
        <button type="submit">Зарегистрироваться</button>
    </form>
    <p><a th:href="@{/login}">Уже есть аккаунт? Войти</a></p>
</div>
</body>
</html>
